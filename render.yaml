services:
  # Node.js Web API Service
  - type: web
    name: kasa-saffron-api
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: kasa-saffron-db
          property: connectionString
      # Let the user set the remaining secret variables in the Render dashboard
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # PostgreSQL Database Service
  - type: pgo
    name: kasa-saffron-db
    databaseName: kasadb
    user: kasa_admin
    plan: free
